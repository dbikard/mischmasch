const { useState, useEffect, useCallback, useRef, useMemo } = React;

// Module runtime: modules self-register into this from their own files.
// Shared helpers are attached at the end of this script (see Object.assign
// near the mount call) once they are all defined.
window.MischMasch = { modules: [] };
window.MischMasch.register = function (m) { window.MischMasch.modules.push(m); };

const APP_VERSION = "3.3";
const STORAGE_KEY = "vocab-de-fr";
const CATEGORIES_KEY = "vocab-de-fr-categories";
const FILTER_KEY = "vocab-de-fr-filter";
const DIRECTION_KEY = "vocab-de-fr-direction";
const STREAK_KEY = "vocab-de-fr-streak";
const MODULE_STATS_KEY = (id) => `vocab-de-fr-${id}-stats`;

/* ── helpers ─────────────────────────────────────────────────── */
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

// Returns the correct value plus up to N random distractors from `all`,
// shuffled. Caps the group size so pool builders can keep distractor
// counts predictable.
function pickWithDistractors(correct, all, count) {
  const others = all.filter((x) => x !== correct);
  return shuffle([correct, ...shuffle(others).slice(0, count)]);
}

// Split a pair into separate cards only when BOTH sides list the same
// number (>1) of "/"-separated alternatives — e.g.
//   "am Morgen / morgens" ⇄ "le matin / tous les matins"
// becomes two cards, so the two distinct expressions are never asked at
// once. One-sided slashes (synonyms like "le collier / la chaîne") and the
// separable-verb notation ("auf/stehen") stay as a single card.
function splitPair(de, fr) {
  const deParts = de.split("/").map((s) => s.trim());
  const frParts = fr.split("/").map((s) => s.trim());
  if (deParts.length > 1 && deParts.length === frParts.length &&
      deParts.every(Boolean) && frParts.every(Boolean)) {
    return deParts.map((d, i) => [d, frParts[i]]);
  }
  return [[de, fr]];
}

function makeWord(de, fr, category) {
  let article = null;
  const m = de.match(/^(der|die|das)\s+/i);
  if (m) { article = m[1].toLowerCase(); de = de.slice(m[0].length); }
  return { de: de.trim(), fr: fr.trim(), article, correct: 0, wrong: 0, genderCorrect: 0, genderWrong: 0, category: category || "my-words" };
}

function parseTable(text, category) {
  return text
    .trim()
    .split("\n")
    .filter(Boolean)
    .flatMap((line) => {
      const parts = line.split(/\t|\s*\|\s*|;\s*|\s{2,}/);
      if (parts.length < 2) return [];
      const de = parts[0].trim();
      const fr = parts[1].trim();
      if (!de || !fr || /^[-=:]+$/.test(de) || /^[-=:]+$/.test(fr)) return [];
      return splitPair(de, fr).map(([d, f]) => makeWord(d, f, category));
    });
}

function getLevel(w) {
  const net = (w.correct || 0) - (w.wrong || 0);
  if (net >= 4) return 3;
  if (net >= 1) return 2;
  if (net >= 0) return 1;
  return 0;
}

function getGenderLevel(w) {
  const net = (w.genderCorrect || 0) - (w.genderWrong || 0);
  if (net >= 4) return 3;
  if (net >= 1) return 2;
  if (net >= 0) return 1;
  return 0;
}

const LEVELS = [
  { label: "Struggling", color: "#c0392b", bg: "#fdecea" },
  { label: "New", color: "#7f8c8d", bg: "#f4f4f4" },
  { label: "Learning", color: "#d4820a", bg: "#fef5e7" },
  { label: "Mastered", color: "#1e8449", bg: "#e8f8f0" },
];

function getTimeWeight(word) {
  const hoursSince = (Date.now() - (word.lastPracticed || 0)) / 3600000;
  const level = getLevel(word);
  if (level === 3) {
    if (hoursSince > 168) return 6;
    if (hoursSince > 48) return 3;
    if (hoursSince > 24) return 2;
    return 1;
  }
  if (level === 2) {
    if (hoursSince > 48) return 3;
    if (hoursSince > 24) return 2;
    return 1;
  }
  return 1;
}

function weightedPick(words, levelFn, useTime) {
  const weights = words.map((w) => {
    const base = [8, 5, 2, 1][levelFn(w)];
    return useTime ? base * getTimeWeight(w) : base;
  });
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < words.length; i++) {
    r -= weights[i];
    if (r <= 0) return words[i];
  }
  return words[words.length - 1];
}

function pickChoices(correct, all, field, count = 4) {
  const others = shuffle(all.filter((w) => w[field] !== correct[field]));
  return shuffle([correct, ...others.slice(0, count - 1)]);
}

function wordKey(w) {
  return (w.de + "|" + w.fr).toLowerCase();
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function yesterdayStr() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

function loadStreak() {
  try {
    return JSON.parse(localStorage.getItem(STREAK_KEY)) || { count: 0, lastDate: "" };
  } catch { return { count: 0, lastDate: "" }; }
}

function updateStreak() {
  const s = loadStreak();
  const today = todayStr();
  if (s.lastDate === today) return s;
  const next = s.lastDate === yesterdayStr()
    ? { count: s.count + 1, lastDate: today }
    : { count: 1, lastDate: today };
  localStorage.setItem(STREAK_KEY, JSON.stringify(next));
  return next;
}

/* ── german time helpers ─────────────────────────────────────── */
const GERMAN_HOURS = ["zwölf", "eins", "zwei", "drei", "vier", "fünf", "sechs", "sieben", "acht", "neun", "zehn", "elf"];

function germanHourWord(h) {
  return GERMAN_HOURS[h % 12];
}

function germanTime(h, m) {
  const hh = ((h - 1) % 12) + 1;
  const next = hh === 12 ? 1 : hh + 1;
  const hWord = germanHourWord(hh);
  const nWord = germanHourWord(next);
  if (m === 0) return `${hh === 1 ? "ein" : hWord} Uhr`;
  if (m === 5) return `fünf nach ${hWord}`;
  if (m === 10) return `zehn nach ${hWord}`;
  if (m === 15) return `viertel nach ${hWord}`;
  if (m === 20) return `zwanzig nach ${hWord}`;
  if (m === 25) return `fünf vor halb ${nWord}`;
  if (m === 30) return `halb ${nWord}`;
  if (m === 35) return `fünf nach halb ${nWord}`;
  if (m === 40) return `zwanzig vor ${nWord}`;
  if (m === 45) return `viertel vor ${nWord}`;
  if (m === 50) return `zehn vor ${nWord}`;
  if (m === 55) return `fünf vor ${nWord}`;
  return "";
}

function formatDigital(h, m) {
  return `${h}:${m.toString().padStart(2, "0")}`;
}

/* ── shared module constants ─────────────────────────────────── */
// Used by several practice modules; exposed on window.MischMasch below.
const SUBJECTS = ["ich", "du", "er", "sie", "wir"];
const FR_PRON = { ich: "je", du: "tu", er: "il", sie: "elle", wir: "nous" };
function capFirst(s) { return s[0].toUpperCase() + s.slice(1); }

/* ── unified spaced-repetition scheduler ─────────────────────── */
// One due-date primitive shared by Auto-Mode across every exercise.
// An "item" is any schedulable skill (a word's translation, a word's
// gender, a grammar micro-skill). Its record is { correct, wrong,
// lastPracticed }; level comes from net = correct − wrong (same buckets
// as getLevel), and each level maps to a review interval.
const SR_KEY = "vocab-de-fr-sr";
const SR_INTERVALS_MS = [
  10 * 60 * 1000,        // 0 Struggling → 10 min
  24 * 3600 * 1000,      // 1 New        → 1 day
  3 * 24 * 3600 * 1000,  // 2 Learning   → 3 days
  7 * 24 * 3600 * 1000,  // 3 Mastered   → 7 days
];
function srLevel(rec) {
  const net = (rec.correct || 0) - (rec.wrong || 0);
  if (net >= 4) return 3;
  if (net >= 1) return 2;
  if (net >= 0) return 1;
  return 0;
}
function srDueAt(rec) {
  return (rec.lastPracticed || 0) + SR_INTERVALS_MS[srLevel(rec)];
}
function srOverdue(rec, now) {
  return now - srDueAt(rec);
}

// Per-item store for grammar modules (vocab keeps its stats on the word).
function loadSRStore() {
  try { return JSON.parse(localStorage.getItem(SR_KEY)) || {}; } catch { return {}; }
}
function srGet(store, id) {
  return store[id] || { correct: 0, wrong: 0, lastPracticed: 0 };
}
function recordSRItem(id, isCorrect) {
  const store = loadSRStore();
  const r = srGet(store, id);
  store[id] = {
    correct: r.correct + (isCorrect ? 1 : 0),
    wrong: r.wrong + (isCorrect ? 0 : 1),
    lastPracticed: Date.now(),
  };
  localStorage.setItem(SR_KEY, JSON.stringify(store));
}

// Accent/diacritic-insensitive comparison for typed vocab answers.
function srNormalize(s) {
  return s.toLowerCase()
    .replace(/ä/g, "ae").replace(/ö/g, "oe").replace(/ü/g, "ue").replace(/ß/g, "ss")
    .replace(/[éèê]/g, "e").replace(/[àâ]/g, "a").replace(/[ùû]/g, "u")
    .replace(/[ôò]/g, "o").replace(/[îï]/g, "i").replace(/ç/g, "c").replace(/œ/g, "oe")
    .replace(/'/g, "'").replace(/-/g, " ");
}
// True if `input` matches `expected` (which may hold "/"-separated
// variants), tolerating a leading French/German article on either side.
function vocabAnswerMatches(input, expected) {
  const strip = (s) => s.trim().toLowerCase().replace(/^(les?|la|l'|un|une|des|der|die|das)\s+/i, "");
  const user = input.trim().toLowerCase();
  const userS = strip(input);
  const alts = new Set();
  expected.split("/").map((s) => s.trim().toLowerCase()).forEach((s) => { alts.add(s); alts.add(strip(s)); });
  for (const a of alts) {
    if (user === a || userS === a || srNormalize(user) === srNormalize(a) || srNormalize(userS) === srNormalize(a)) return true;
  }
  return false;
}

/* ── module infrastructure ───────────────────────────────────── */
// Shared persistence for practice modules (Uhrzeit and future additions).
// Each module's progress is saved under `vocab-de-fr-<id>-stats`.
// Storage shape: { correct, wrong, bestStreak }.
const DEFAULT_MODULE_STATS = { correct: 0, wrong: 0, bestStreak: 0 };

function useModuleStats(id) {
  const key = MODULE_STATS_KEY(id);
  const [stats, setStats] = useState(() => {
    try {
      const raw = JSON.parse(localStorage.getItem(key));
      return raw && typeof raw === "object" ? { ...DEFAULT_MODULE_STATS, ...raw } : { ...DEFAULT_MODULE_STATS };
    } catch { return { ...DEFAULT_MODULE_STATS }; }
  });
  const record = useCallback((isCorrect, currentStreak = 0) => {
    setStats((s) => {
      const next = isCorrect
        ? { ...s, correct: s.correct + 1, bestStreak: Math.max(s.bestStreak, currentStreak) }
        : { ...s, wrong: s.wrong + 1 };
      localStorage.setItem(key, JSON.stringify(next));
      return next;
    });
  }, [key]);
  return [stats, record];
}

// Header and footer shared across practice modules.
// Pair with useModuleStats(id) for standard progress tracking.
function ModuleHeader({ title, stats, streak }) {
  const total = stats.correct + stats.wrong;
  const accuracy = total > 0 ? Math.round((stats.correct / total) * 100) : 0;
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
      <h1>{title}</h1>
      <div style={{ display: "flex", gap: 6 }}>

        {streak > 0 && <div className="streak-badge">{"\u{1F525}"} {streak}</div>}
      </div>
    </div>

}

function ModuleStatsFooter({ stats }) {

}

/* ── main component ──────────────────────────────────────────── */
function VocabTrainer() {
  const [words, setWords] = useState([]);
  const [categories, setCategories] = useState([]);
  const [view, setView] = useState("home");
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    const storedCats = JSON.parse(localStorage.getItem(CATEGORIES_KEY) || "null");

    fetch('./words/index.json')
      .then((r) => r.json())
      .then((index) => {
        const cats = [...index, { id: "my-words", name: "My words" }];
        setCategories(cats);
        localStorage.setItem(CATEGORIES_KEY, JSON.stringify(cats));

        return Promise.all(
          index.map((cat) =>
            fetch('./words/' + cat.file)
              .then((r) => r.text())
              .then((text) => parseTable(text, cat.id))
          )
        );
      })
      .then((results) => {
        const fetched = results.flat();
        const existingMap = {};
        if (stored) {
          stored.forEach((w) => { existingMap[wordKey(w)] = w; });
        }
        // Merge: keep existing scores, add new words from files
        const merged = [];
        const seen = new Set();
        // First, add all fetched words (with existing scores if available)
        for (const w of fetched) {
          const k = wordKey(w);
          if (seen.has(k)) continue;
          seen.add(k);
          if (existingMap[k]) {
            merged.push({ ...existingMap[k], category: w.category });
          } else {
            merged.push(w);
          }
        }
        // Then, add any user-added words from localStorage not in fetched files
        if (stored) {
          for (const w of stored) {
            const k = wordKey(w);
            if (seen.has(k)) continue;
            // Drop stale parallel-slash combos saved before splitting existed
            // — they're now superseded by the separate split cards above.
            if (splitPair(w.de, w.fr).length > 1) continue;
            seen.add(k);
            merged.push({ ...w, category: w.category || "my-words" });
          }
        }
        setWords(merged);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
        setLoading(false);
      })
      .catch(() => {
        // Offline or fetch failed — use stored data
        if (stored) setWords(stored);
        if (storedCats) setCategories(storedCats);
        else setCategories([{ id: "my-words", name: "My words" }]);
        setLoading(false);
      });
  }, []);

  const save = useCallback((next) => {
    setWords(next);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
  }, []);

  if (loading) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", fontFamily: "'Lora', serif", fontSize: 28, color: "#5c4f3d" }}>
      <style>{CSS}</style>
      Loading...
    </div>
  );

  const activeModule = MODULES.find((m) => m.id === view);
  const ActiveModuleComponent = activeModule?.component;

  return (
    <>
      <style>{CSS}</style>
      <div className="app">
        {view === "home" && <HomeView words={words} categories={categories} setView={setView} />}
        {view === "add" && <AddView words={words} save={save} />}
        {view === "practice" && (
          <div style={{ paddingTop: 20 }}>
            <button className="back-btn" onClick={() => setView("modules")}>
              {"←"} Übungen
            </button>
            <PracticeView words={words} categories={categories} save={save} />
          </div>
        )}
        {view === "modules" && <ModulesView setView={setView} />}
        {view === "auto" && (
          <div style={{ paddingTop: 20 }}>
            <button className="back-btn" onClick={() => setView("home")}>
              {"←"} Home
            </button>
            <AutoModeView words={words} save={save} />
          </div>
        )}
        {view === "stats" && <StatsView words={words} categories={categories} save={save} />}
        {ActiveModuleComponent && (
          <div style={{ paddingTop: 20 }}>
            <button className="back-btn" onClick={() => setView("modules")}>
              {"←"} Übungen
            </button>
            <ActiveModuleComponent />
          </div>
        )}
      </div>
      <Nav view={view} setView={setView} />
    </>
  );
}

/* ── auto-mode: generic round presenters ─────────────────────── */
// Three declarative round kinds cover every exercise. Each renders one
// round from a `spec`, shows feedback, and calls onResult(bool) when the
// learner taps "Weiter". They own no scheduling — the player advances.

function ChoiceRound({ spec, onResult }) {
  const [picked, setPicked] = useState(null);
  const done = picked !== null;
  return (
    <div className="fade-in">
      <div className="card" style={{ marginBottom: 16, padding: 24, textAlign: "center" }}>
        {spec.visual && <div style={{ position: "relative", display: "flex", justifyContent: "center" }}>{spec.visual}</div>}
        {spec.cue && <div className="card-hint" style={{ marginTop: spec.visual ? 10 : 0, marginBottom: spec.word ? 12 : 10, position: "relative" }}>{spec.cue}</div>}
        {spec.word ? (
          <div className="card-word">{spec.word}</div>
        ) : (
          <div style={{ fontFamily: "'Lora', serif", fontSize: 24, fontWeight: 700, lineHeight: 1.35, position: "relative" }}>
            {spec.pre}{" "}
            <span style={{ color: done ? (picked === spec.correct ? "var(--green)" : "var(--red)") : "var(--accent)", borderBottom: "2px solid currentColor", padding: "0 4px", minWidth: 44, display: "inline-block" }}>{picked || "?"}</span>{" "}
            {spec.post}
          </div>
        )}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>
        {spec.options.map((opt) => {
          let cls = "choice-btn";
          if (done) { if (opt === spec.correct) cls += " choice-correct"; else if (opt === picked) cls += " choice-wrong"; }
          return (
            <button key={opt} className={cls} style={{ textAlign: "center" }} onClick={() => !done && setPicked(opt)} disabled={done}>
              {opt}
            </button>
          );
        })}
      </div>
      {done && spec.explanation && (
        <div className="fade-in card" style={{ padding: 16, marginBottom: 16, textAlign: "center" }}>
          <div style={{ fontSize: 13, color: "var(--ink2)", position: "relative" }}>{spec.explanation}</div>
        </div>
      )}
      {done && <button className="btn btn-primary" onClick={() => onResult(picked === spec.correct)}>Weiter {"→"}</button>}
    </div>
  );
}

function TypedRound({ spec, onResult }) {
  const [input, setInput] = useState("");
  const [done, setDone] = useState(null); // "correct" | "wrong"
  const ref = useRef(null);
  useEffect(() => { const t = setTimeout(() => ref.current?.focus(), 50); return () => clearTimeout(t); }, []);
  const check = () => {
    if (done || !input.trim()) return;
    setDone(vocabAnswerMatches(input, spec.expected) ? "correct" : "wrong");
  };
  return (
    <div className="fade-in">
      <div className="card" style={{ marginBottom: 16, minHeight: 120, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div className="card-hint" style={{ marginBottom: 12, position: "relative" }}>{spec.cue}</div>
        <div className="card-word">{spec.prompt}</div>
      </div>
      <input
        ref={ref} type="text" value={input} onChange={(e) => setInput(e.target.value)}
        onKeyDown={(e) => e.key === "Enter" && (done ? onResult(done === "correct") : check())}
        placeholder={spec.placeholder} disabled={!!done} autoFocus
      />
      {done === "wrong" && (
        <div className="fade-in" style={{ marginTop: 12, padding: 14, borderRadius: 12, background: "#fdecea", textAlign: "center" }}>
          <div style={{ fontSize: 13, color: "var(--red)", fontWeight: 600, marginBottom: 4 }}>Richtige Antwort:</div>
          <div style={{ fontFamily: "'Lora', serif", fontSize: 24, color: "var(--ink)" }}>{spec.display}</div>
        </div>
      )}
      {done === "correct" && (
        <div className="fade-in" style={{ marginTop: 12, padding: 14, borderRadius: 12, background: "#e8f8f0", textAlign: "center", color: "var(--green)", fontWeight: 700, fontFamily: "'Lora', serif", fontSize: 22 }}>
          {"✓"} {spec.display}
        </div>
      )}
      <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
        {done ? (
          <button className="btn btn-primary" onClick={() => onResult(done === "correct")}>Weiter {"→"}</button>
        ) : (
          <>
            <button className="btn btn-outline btn-small" onClick={() => setDone("wrong")}>Show answer</button>
            <button className="btn btn-primary" style={{ flex: 1 }} onClick={check} disabled={!input.trim()}>Check</button>
          </>
        )}
      </div>
    </div>
  );
}

function TokensRound({ spec, onResult }) {
  const [tokens, setTokens] = useState([]);
  const [result, setResult] = useState(null);
  const add = (w) => { if (!result) setTokens((t) => [...t, w]); };
  const removeAt = (i) => { if (!result) setTokens((t) => t.filter((_, j) => j !== i)); };
  const clear = () => { if (!result) setTokens([]); };
  const check = () => {
    if (result || tokens.length === 0) return;
    const phrase = [spec.starter, ...tokens].filter(Boolean).join(" ");
    setResult(phrase === spec.target ? "correct" : "wrong");
  };
  const slotClass = result === "correct" ? "time-slot-correct" : result === "wrong" ? "time-slot-wrong" : "";
  return (
    <div className="fade-in">
      <div className="card" style={{ marginBottom: 16, padding: 20, display: "flex", flexDirection: "column", alignItems: "center" }}>
        {spec.badge && (
          <div style={{ position: "relative", display: "inline-block", padding: "4px 12px", borderRadius: 999, fontSize: 12, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", color: spec.badgeNeg ? "var(--red)" : "var(--green)", background: spec.badgeNeg ? "#fdecea" : "#e8f8f0", marginBottom: 8 }}>{spec.badge}</div>
        )}
        {spec.visual && <div style={{ position: "relative" }}>{spec.visual}</div>}
        {spec.cue && <div style={{ fontSize: 13, color: "var(--ink2)", textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 600, marginTop: spec.visual ? 12 : 0, position: "relative", textAlign: "center" }}>{spec.cue}</div>}
        {spec.prompt && <div style={{ fontFamily: "'Lora', serif", fontSize: 22, fontWeight: 700, color: "var(--ink)", marginTop: 4, position: "relative", textAlign: "center" }}>{spec.prompt}</div>}
        {result && <div className="fade-in" style={{ marginTop: 10, position: "relative", textAlign: "center", fontSize: 15, fontWeight: 600, color: result === "correct" ? "var(--green)" : "var(--red)" }}>{spec.target}</div>}
      </div>
      <div className={`time-slot ${slotClass}`}>
        {spec.starter && <span className="time-token time-token-locked">{spec.starter}</span>}
        {tokens.length === 0 && !spec.starter ? (
          <span className="time-slot-empty">Tap words below to build the phrase</span>
        ) : (
          tokens.map((w, i) => (
            <button key={i} className="time-token time-token-selected" onClick={() => removeAt(i)} disabled={result !== null}>{w}</button>
          ))
        )}
      </div>
      <div className="time-pool">
        {spec.pool.map((w, i) => (
          <button key={w + i} className="time-token" onClick={() => add(w)} disabled={result !== null}>{w}</button>
        ))}
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        {result ? (
          <button className="btn btn-primary" onClick={() => onResult(result === "correct")} style={{ flex: 1 }}>Weiter {"→"}</button>
        ) : (
          <>
            <button className="btn btn-outline" onClick={clear} disabled={tokens.length === 0} style={{ flex: 1 }}>Clear</button>
            <button className="btn btn-primary" onClick={check} disabled={tokens.length === 0} style={{ flex: 2 }}>Check</button>
          </>
        )}
      </div>
    </div>
  );
}

/* ── auto-mode: exercise sources + scheduler ─────────────────── */
// Vocabulary is a built-in source; each grammar module contributes one
// via its `sr` interface. A source exposes: items(), recOf(id) → SR
// record, generateRound(id) → spec, record(id, ok) → persist.
function autoVocabSource(words, save, directionMode) {
  const byId = {};
  words.forEach((w) => {
    const k = wordKey(w);
    byId["v:t:" + k] = { word: w, kind: "t" };
    if (w.article) byId["v:g:" + k] = { word: w, kind: "g" };
  });
  return {
    id: "vocab", label: "Vocabeln", icon: "\u{1F3B4}",
    items: () => Object.keys(byId),
    recOf: (id) => {
      const { word, kind } = byId[id];
      return kind === "g"
        ? { correct: word.genderCorrect || 0, wrong: word.genderWrong || 0, lastPracticed: word.lastPracticed || 0 }
        : { correct: word.correct || 0, wrong: word.wrong || 0, lastPracticed: word.lastPracticed || 0 };
    },
    generateRound: (id) => {
      const { word, kind } = byId[id];
      if (kind === "g") {
        return { kind: "choice", word: word.de, cue: "Welcher Artikel?", options: ["der", "die", "das"], correct: word.article };
      }
      const dir = directionMode === "both" ? (Math.random() < 0.5 ? "de>fr" : "fr>de") : directionMode;
      if (dir === "de>fr") {
        return { kind: "typed", cue: "Deutsch → Français", prompt: `${word.article ? word.article + " " : ""}${word.de}`, expected: word.fr, display: word.fr, placeholder: "Type in French..." };
      }
      return { kind: "typed", cue: "Français → Deutsch", prompt: word.fr, expected: word.de, display: `${word.article ? word.article + " " : ""}${word.de}`, placeholder: "Type in German..." };
    },
    record: (id, ok) => {
      const { word, kind } = byId[id];
      const field = ok ? (kind === "g" ? "genderCorrect" : "correct") : (kind === "g" ? "genderWrong" : "wrong");
      save(words.map((w) => (w.de === word.de && w.fr === word.fr) ? { ...w, [field]: (w[field] || 0) + 1, lastPracticed: Date.now() } : w));
    },
  };
}
function autoModuleSource(m) {
  return {
    id: m.id, label: m.label, icon: m.icon,
    items: () => m.sr.items(),
    recOf: (id) => srGet(loadSRStore(), id),
    generateRound: (id) => m.sr.generateRound(id),
    record: (id, ok) => recordSRItem(id, ok),
  };
}

/* ── auto-mode player ─────────────────────────────────────────── */
function AutoModeView({ words, save }) {
  const directionMode = (() => {
    const s = localStorage.getItem(DIRECTION_KEY);
    return s === "de>fr" || s === "fr>de" || s === "both" ? s : "both";
  })();
  const sources = useMemo(() => {
    const list = [autoVocabSource(words, save, directionMode)];
    MODULES.forEach((m) => { if (m.sr) list.push(autoModuleSource(m)); });
    return list;
  }, [words, directionMode]);
  const sourcesRef = useRef(sources);
  sourcesRef.current = sources;

  const [pick, setPick] = useState(null);
  const [streak, setStreak] = useState(0);
  const [count, setCount] = useState(0);
  const historyRef = useRef({ types: [], items: [] });

  const pickNext = useCallback(() => {
    const srcs = sourcesRef.current;
    const now = Date.now();
    const cands = [];
    srcs.forEach((s) => s.items().forEach((id) => cands.push({ srcId: s.id, itemId: id, overdue: srOverdue(s.recOf(id), now) })));
    if (cands.length === 0) { setPick(null); return; }
    // Shuffle first, then stable-sort by overdue — so the many equally
    // overdue never-seen items (esp. at cold start) are ordered randomly
    // instead of always favouring the first source/item in array order.
    shuffle(cands).forEach((c, i) => { c._i = i; });
    cands.sort((a, b) => (b.overdue - a.overdue) || (a._i - b._i));
    const h = historyRef.current;
    const lastType = h.types[h.types.length - 1];
    const twoSame = h.types.length >= 2 && h.types[h.types.length - 1] === h.types[h.types.length - 2];
    const recent = new Set(h.items.slice(-5));
    const chosen =
      cands.find((c) => !(twoSame && c.srcId === lastType) && !recent.has(c.itemId)) ||
      cands.find((c) => !recent.has(c.itemId)) ||
      cands[0];
    const src = srcs.find((s) => s.id === chosen.srcId);
    let spec = null;
    try { spec = src.generateRound(chosen.itemId); } catch (e) { spec = null; }
    h.types.push(chosen.srcId); h.items.push(chosen.itemId);
    if (h.types.length > 20) h.types.shift();
    if (h.items.length > 20) h.items.shift();
    if (!spec) { setPick(null); return; }
    setPick({ srcId: src.id, itemId: chosen.itemId, spec, srcLabel: src.label, srcIcon: src.icon });
  }, []);

  useEffect(() => { pickNext(); }, [pickNext]);

  const onResult = (ok) => {
    const src = sourcesRef.current.find((s) => s.id === pick.srcId);
    if (src) src.record(pick.itemId, ok);
    setStreak((s) => (ok ? s + 1 : 0));
    setCount((c) => c + 1);
    pickNext();
  };

  if (!pick) {
    return (
      <div className="fade-in" style={{ paddingTop: 8 }}>
        <h1 style={{ marginBottom: 16 }}>Auto-Modus</h1>
        <div className="card" style={{ padding: 32, textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 8, position: "relative" }}>{"\u{1F9E9}"}</div>
          <p style={{ color: "var(--ink2)", fontSize: 15, position: "relative" }}>Nichts zu üben — füge zuerst ein paar Wörter hinzu.</p>
        </div>
      </div>
    );
  }

  const P = pick.spec.kind === "typed" ? TypedRound : pick.spec.kind === "choice" ? ChoiceRound : TokensRound;
  return (
    <div className="fade-in" style={{ paddingTop: 8 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
        <h1>Auto-Modus</h1>
        <div style={{ display: "flex", gap: 6 }}>
          {count > 0 && <div className="streak-badge">{count}</div>}
          {streak > 0 && <div className="streak-badge">{"\u{1F525}"} {streak}</div>}
        </div>
      </div>
      <div style={{ marginBottom: 14 }}>
        <span className="streak-badge" aria-label={pick.srcLabel}>
          <span aria-hidden="true">{pick.srcIcon}</span> {pick.srcLabel}
        </span>
      </div>
      <P key={count} spec={pick.spec} onResult={onResult} />
    </div>
  );
}

/* ── home ────────────────────────────────────────────────────── */
function HomeView({ words, categories, setView }) {
  const withArticle = words.filter((w) => w.article);
  const catCounts = {};
  words.forEach((w) => { catCounts[w.category] = (catCounts[w.category] || 0) + 1; });

  const [shared, setShared] = useState(false);
  // Native share sheet (WhatsApp, Messages, …) where available; otherwise
  // copy the app link to the clipboard with brief confirmation.
  const shareApp = async () => {
    const url = location.origin + location.pathname;
    if (navigator.share) {
      try {
        await navigator.share({ title: "MischMasch", text: "Lerne mit mir mit MischMasch — Deutsch ↔ Français", url });
      } catch (e) { /* user cancelled — no-op */ }
      return;
    }
    try {
      await navigator.clipboard.writeText(url);
      setShared(true);
      setTimeout(() => setShared(false), 2000);
    } catch {
      window.prompt("Link kopieren:", url);
    }
  };

  return (
    <div className="fade-in" style={{ paddingTop: 40 }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <h1 style={{ fontSize: 38, marginBottom: 4 }}>MischMasch</h1>
        <p style={{ color: "var(--ink2)", fontSize: 14, fontWeight: 500 }}>Deutsch ↔ Français</p>
        <p style={{ color: "var(--ink2)", fontSize: 11, marginTop: 2, opacity: 0.5, cursor: "pointer" }} onClick={() => {
          if (confirm("Update app to latest version?")) {
            caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => {
                  Promise.all(regs.map(r => r.unregister())).then(() => location.reload());
                });
              } else {
                location.reload();
              }
            });
          }
        }}>v{APP_VERSION} ↻</p>
        {(() => {
          const s = loadStreak();
          const isActive = s.lastDate === todayStr() || s.lastDate === yesterdayStr();
          return isActive && s.count > 0 ? (
            <div className="streak-badge" style={{ marginTop: 10, display: "inline-flex" }}>
              {"\u{1F525}"} {s.count} day streak
            </div>
          ) : null;
        })()}
      </div>

      <div className="card" style={{ marginBottom: 20, padding: 24 }}>
        <div style={{ fontSize: 48, marginBottom: 4, position: "relative" }}>{words.length === 0 ? "\u{1F4DD}" : "\u{1F4DA}"}</div>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 24, fontWeight: 700, position: "relative" }}>
          {words.length} {words.length === 1 ? "word" : "words"}
        </div>
        {categories.filter((c) => catCounts[c.id]).length > 1 && (
          <div style={{ fontSize: 13, color: "var(--ink2)", marginTop: 6, position: "relative" }}>
            {categories.filter((c) => catCounts[c.id]).map((c) => `${c.name} (${catCounts[c.id]})`).join(" · ")}
          </div>
        )}
        {withArticle.length > 0 && (
          <div style={{ fontSize: 13, color: "var(--ink2)", marginTop: 4, position: "relative" }}>
            {withArticle.length} with article
          </div>
        )}
      </div>

      {words.length === 0 ? (
        <button className="btn btn-primary" onClick={() => setView("add")}>
          Erste Wörter hinzufügen
        </button>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <button className="btn btn-primary" onClick={() => setView("auto")}>
            {"⚡"} Auto-Modus
          </button>
          <button className="btn btn-secondary" onClick={() => setView("modules")}>
            Übung wählen
          </button>
          <button className="btn btn-secondary" onClick={() => setView("add")}>
            Wörter hinzufügen
          </button>
        </div>
      )}

      <div style={{ textAlign: "center", marginTop: 20 }}>
        <button
          onClick={shareApp}
          aria-label="App teilen"
          style={{ background: "none", border: "none", cursor: "pointer", color: shared ? "var(--green)" : "var(--ink2)", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 6, padding: 6 }}
        >
          <span aria-hidden="true">{shared ? "✓" : "\u{1F4E4}"}</span>
          {shared ? "Link kopiert!" : "MischMasch teilen"}
        </button>
      </div>
    </div>
  );
}

/* ── add words ───────────────────────────────────────────────── */
function AddView({ words, save }) {
  const [text, setText] = useState("");
  const [preview, setPreview] = useState(null);
  const [showList, setShowList] = useState(false);
  const [deleteId, setDeleteId] = useState(null);

  const handleParse = () => {
    const parsed = parseTable(text, "my-words");
    setPreview(parsed.length > 0 ? parsed : []);
  };

  const handleConfirm = () => {
    if (!preview || preview.length === 0) return;
    const merged = [...words];
    for (const p of preview) {
      const exists = merged.find((w) => w.de.toLowerCase() === p.de.toLowerCase() && w.fr.toLowerCase() === p.fr.toLowerCase());
      if (!exists) merged.push(p);
    }
    save(merged);
    setText("");
    setPreview(null);
  };

  const handleDelete = (idx) => {
    save(words.filter((_, i) => i !== idx));
    setDeleteId(null);
  };

  return (
    <div className="fade-in" style={{ paddingTop: 32 }}>
      <h1 style={{ marginBottom: 20 }}>Add Words</h1>

      <div style={{ marginBottom: 8, fontSize: 13, color: "var(--ink2)", fontWeight: 500 }}>
        Paste your vocabulary (German ; French):
      </div>
      <textarea
        value={text}
        onChange={(e) => { setText(e.target.value); setPreview(null); }}
        placeholder={"der Hund ; le chien\ndie Katze ; le chat\ndas Haus ; la maison"}
      />
      <div style={{ marginTop: 10 }}>
        <button className="btn btn-primary" onClick={handleParse} disabled={!text.trim()}>
          Parse
        </button>
      </div>

      {preview !== null && (
        <div className="fade-in" style={{ marginTop: 20 }}>
          {preview.length === 0 ? (
            <div className="card" style={{ padding: 20 }}>
              <div style={{ position: "relative", color: "var(--red)", fontWeight: 600 }}>
                No word pairs found. Try tab, pipe, or semicolon as separator.
              </div>
            </div>
          ) : (
            <>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 10, color: "var(--accent)" }}>
                Found {preview.length} word pair{preview.length !== 1 ? "s" : ""}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 14 }}>
                {preview.map((p, i) => (
                  <div key={i} className="word-row" style={{ fontSize: 14 }}>
                    <span style={{ fontWeight: 600 }}>
                      {p.article && <span style={{ color: "var(--accent2)" }}>{p.article} </span>}
                      {p.de}
                    </span>
                    <span style={{ color: "var(--ink2)" }}>{"\u2192"}</span>
                    <span>{p.fr}</span>
                  </div>
                ))}
              </div>
              <button className="btn btn-green" onClick={handleConfirm}>
                Add {preview.length} word{preview.length !== 1 ? "s" : ""}
              </button>
            </>
          )}
        </div>
      )}

      {words.length > 0 && (
        <div style={{ marginTop: 32 }}>
          <button className="btn btn-outline btn-small" style={{ marginBottom: 12 }} onClick={() => setShowList(!showList)}>
            {showList ? "Hide" : "Show"} word list ({words.length})
          </button>
          {showList && (
            <div className="fade-in" style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {words.map((w, i) => (
                <div key={i} className="word-row" style={{ fontSize: 14 }}>
                  <div style={{ flex: 1 }}>
                    <span style={{ fontWeight: 600 }}>
                      {w.article && <span style={{ color: "var(--accent2)" }}>{w.article} </span>}
                      {w.de}
                    </span>
                    <span style={{ color: "var(--ink2)", margin: "0 6px" }}>{"\u2192"}</span>
                    <span>{w.fr}</span>
                  </div>
                  <button
                    onClick={() => setDeleteId(i)}
                    style={{ background: "none", border: "none", color: "var(--red)", cursor: "pointer", fontSize: 18, padding: "0 4px" }}
                  >
                    {"\u00D7"}
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {deleteId !== null && (
        <div className="confirm-modal" onClick={() => setDeleteId(null)}>
          <div className="confirm-box" onClick={(e) => e.stopPropagation()}>
            <h2 style={{ marginBottom: 8 }}>Delete word?</h2>
            <p style={{ fontSize: 14, color: "var(--ink2)", marginBottom: 20 }}>
              {words[deleteId]?.article && `${words[deleteId].article} `}{words[deleteId]?.de} {"\u2192"} {words[deleteId]?.fr}
            </p>
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn btn-secondary" onClick={() => setDeleteId(null)}>Cancel</button>
              <button className="btn btn-red" onClick={() => handleDelete(deleteId)}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── practice ────────────────────────────────────────────────── */
function PracticeView({ words, categories, save }) {
  const [mode, setMode] = useState("type");
  const [current, setCurrent] = useState(null);
  const [direction, setDirection] = useState("de>fr");
  const [directionMode, setDirectionMode] = useState(() => {
    const stored = localStorage.getItem(DIRECTION_KEY);
    return stored === "de>fr" || stored === "fr>de" || stored === "both" ? stored : "both";
  });
  const [choices, setChoices] = useState([]);
  const [input, setInput] = useState("");
  const [result, setResult] = useState(null);
  const [correctAnswer, setCorrectAnswer] = useState("");
  const [partialReason, setPartialReason] = useState("");
  const [choiceStates, setChoiceStates] = useState({});
  const [streak, setStreak] = useState(0);
  const [sessionCount, setSessionCount] = useState(0);
  const [showFilters, setShowFilters] = useState(false);
  const inputRef = useRef(null);
  const streakUpdated = useRef(false);

  // Category filter — default: all active
  const [activeCategories, setActiveCategories] = useState(() => {
    const stored = JSON.parse(localStorage.getItem(FILTER_KEY) || "null");
    return stored ? new Set(stored) : null; // null = all
  });

  const availableCategories = useMemo(() => {
    const catIds = new Set(words.map((w) => w.category));
    return categories.filter((c) => catIds.has(c.id));
  }, [words, categories]);

  const allActive = activeCategories === null || activeCategories.size === availableCategories.length;

  const filteredWords = useMemo(() => {
    if (allActive) return words;
    return words.filter((w) => activeCategories.has(w.category));
  }, [words, activeCategories, allActive]);

  const toggleCategory = (catId) => {
    let next;
    if (allActive) {
      // Switching from "all" to just this one
      next = new Set([catId]);
    } else if (activeCategories.has(catId)) {
      next = new Set(activeCategories);
      next.delete(catId);
      if (next.size === 0) next = null; // back to all
    } else {
      next = new Set(activeCategories);
      next.add(catId);
      if (next.size === availableCategories.length) next = null; // all selected = all
    }
    setActiveCategories(next);
    localStorage.setItem(FILTER_KEY, JSON.stringify(next ? [...next] : null));
  };

  const setAll = () => {
    setActiveCategories(null);
    localStorage.setItem(FILTER_KEY, "null");
  };

  const changeDirectionMode = (next) => {
    setDirectionMode(next);
    localStorage.setItem(DIRECTION_KEY, next);
  };

  const wordsWithArticle = filteredWords.filter((w) => w.article);
  const hasEnough = mode === "gender" ? wordsWithArticle.length >= 1 : (mode === "choice" ? filteredWords.length >= 4 : filteredWords.length >= 1);

  const nextCard = useCallback(() => {
    setResult(null);
    setInput("");
    setChoiceStates({});
    setCorrectAnswer("");
    setPartialReason("");

    if (mode === "gender") {
      const pool = filteredWords.filter((w) => w.article);
      if (pool.length === 0) return;
      const w = weightedPick(pool, getGenderLevel, true);
      setCurrent(w);
    } else {
      const dir = directionMode === "both"
        ? (Math.random() < 0.5 ? "de>fr" : "fr>de")
        : directionMode;
      setDirection(dir);
      const w = weightedPick(filteredWords, getLevel, true);
      setCurrent(w);
      if (mode === "choice") {
        const field = dir === "de>fr" ? "fr" : "de";
        setChoices(pickChoices(w, filteredWords, field));
      }
    }
    setTimeout(() => inputRef.current?.focus(), 100);
  }, [filteredWords, mode, directionMode]);

  useEffect(() => {
    if (hasEnough) nextCard();
  }, [mode, activeCategories, directionMode]);

  useEffect(() => {
    if (sessionCount === 1 && !streakUpdated.current) {
      streakUpdated.current = true;
      updateStreak();
    }
  }, [sessionCount]);

  const updateWord = useCallback((word, field, delta) => {
    const next = words.map((w) =>
      w.de === word.de && w.fr === word.fr ? { ...w, [field]: (w[field] || 0) + delta, lastPracticed: Date.now() } : w
    );
    save(next);
  }, [words, save]);

  const normalizeText = (s) => s.toLowerCase().replace(/ä/g, "ae").replace(/ö/g, "oe").replace(/ü/g, "ue").replace(/ß/g, "ss").replace(/[éèê]/g, "e").replace(/[àâ]/g, "a").replace(/[ùû]/g, "u").replace(/[ôò]/g, "o").replace(/[îï]/g, "i").replace(/ç/g, "c").replace(/œ/g, "oe").replace(/'/g, "'").replace(/-/g, " ");

  const handleTypeSubmit = () => {
    if (!input.trim() || result) return;
    const rawExpected = direction === "de>fr" ? current.fr : current.de;
    const displayExpected = direction === "fr>de" && current.article
      ? current.article + " " + current.de
      : rawExpected;
    const alternatives = rawExpected.split("/").map((s) => s.trim().toLowerCase());
    // Also accept "article + word" when translating to German
    if (direction === "fr>de" && current.article) {
      rawExpected.split("/").forEach((s) => {
        alternatives.push((current.article + " " + s.trim()).toLowerCase());
      });
    }
    // Also accept answers without French article when translating to French
    if (direction === "de>fr") {
      rawExpected.split("/").forEach((s) => {
        const stripped = s.trim().replace(/^(les?|la|l'|un|une|des)\s+/i, "");
        if (stripped.toLowerCase() !== s.trim().toLowerCase()) {
          alternatives.push(stripped.toLowerCase());
        }
      });
    }
    const userInput = input.trim().toLowerCase();
    const wordAlts = rawExpected.split("/").map((s) => s.trim().toLowerCase());
    const isCorrect = alternatives.some((alt) => userInput === alt || normalizeText(userInput) === normalizeText(alt));

    // Check partial matches for fr>de when word has an article
    let partialType = null; // "no-article", "wrong-article", or "capitalization"
    if (direction === "fr>de" && current.article) {
      if (isCorrect) {
        // Check if they typed just the word without article
        const hasArticle = userInput.match(/^(der|die|das)\s+/i);
        if (!hasArticle) {
          partialType = "no-article";
        }
      } else {
        // Check if they typed wrong article but correct word
        const articleMatch = userInput.match(/^(der|die|das)\s+(.+)$/i);
        if (articleMatch) {
          const typedWord = articleMatch[2].toLowerCase();
          const isWordCorrect = wordAlts.some((alt) => typedWord === alt || normalizeText(typedWord) === normalizeText(alt));
          if (isWordCorrect) partialType = "wrong-article";
        }
      }
    }

    // Check capitalization: warn if a word that should be capitalized wasn't (ignoring first char)
    if (isCorrect && !partialType) {
      const originalAlts = rawExpected.split("/").map((s) => s.trim());
      if (direction === "fr>de" && current.article) {
        rawExpected.split("/").forEach((s) => {
          originalAlts.push(current.article + " " + s.trim());
        });
      }
      const userOriginal = input.trim();
      const matchedAlt = originalAlts.find((alt) =>
        userOriginal.toLowerCase() === alt.toLowerCase() || normalizeText(userOriginal) === normalizeText(alt)
      );
      if (matchedAlt) {
        const userWords = userOriginal.split(/\s+/);
        const expectedWords = matchedAlt.split(/\s+/);
        for (let i = 0; i < Math.min(userWords.length, expectedWords.length); i++) {
          // Skip first character of the entire answer (sentence-start capitalization doesn't matter)
          if (i === 0) {
            if (userWords[i].slice(1) !== expectedWords[i].slice(1) &&
                userWords[i].slice(1).toLowerCase() === expectedWords[i].slice(1).toLowerCase()) {
              partialType = "capitalization";
            }
          } else if (userWords[i] !== expectedWords[i] && userWords[i].toLowerCase() === expectedWords[i].toLowerCase()) {
            partialType = "capitalization";
          }
        }
      }
    }

    if (isCorrect && !partialType) {
      setResult("correct");
      setCorrectAnswer(displayExpected);
      setSessionCount((c) => c + 1);
      updateWord(current, "correct", 2);
      if (direction === "fr>de" && current.article && userInput.match(/^(der|die|das)\s+/i)) {
        updateWord(current, "genderCorrect", 1);
      }
      setStreak((s) => s + 1);
      setTimeout(nextCard, 900);
    } else if (partialType === "no-article") {
      setResult("partial");
      setPartialReason("Don't forget the article!");
      setCorrectAnswer(displayExpected);
      setSessionCount((c) => c + 1);
      updateWord(current, "correct", 0.5);
      setTimeout(nextCard, 1500);
    } else if (partialType === "wrong-article") {
      setResult("partial");
      setPartialReason("Correct word, but wrong article!");
      setCorrectAnswer(displayExpected);
      setSessionCount((c) => c + 1);
      updateWord(current, "correct", 0.5);
      updateWord(current, "genderWrong", 1);
      setTimeout(nextCard, 1500);
    } else if (partialType === "capitalization") {
      setResult("partial");
      setPartialReason("Watch the capitalization!");
      setCorrectAnswer(displayExpected);
      setSessionCount((c) => c + 1);
      updateWord(current, "correct", 0.5);
      setTimeout(nextCard, 1500);
    } else {
      setResult("wrong");
      setCorrectAnswer(displayExpected);
      setSessionCount((c) => c + 1);
      updateWord(current, "wrong", 1);
      setStreak(0);
    }
  };

  const handleChoice = (chosen, idx) => {
    if (result) return;
    const field = direction === "de>fr" ? "fr" : "de";
    const isCorrect = chosen[field] === current[field];
    const states = {};
    if (isCorrect) {
      states[idx] = "correct";
    } else {
      states[idx] = "wrong";
      const correctIdx = choices.findIndex((c) => c[field] === current[field]);
      states[correctIdx] = "correct";
    }
    setChoiceStates(states);
    setResult(isCorrect ? "correct" : "wrong");
    setSessionCount((c) => c + 1);
    if (isCorrect) {
      updateWord(current, "correct", 1);
      setStreak((s) => s + 1);
    } else {
      updateWord(current, "wrong", 1);
      setStreak(0);
    }
    setTimeout(nextCard, 1200);
  };

  const handleGender = (chosen) => {
    if (result) return;
    const isCorrect = chosen === current.article;
    setResult(isCorrect ? "correct" : "wrong");
    setCorrectAnswer(current.article);
    setSessionCount((c) => c + 1);

    const states = {};
    ["der", "die", "das"].forEach((g) => {
      if (g === chosen && !isCorrect) states[g] = "wrong";
      if (g === current.article) states[g] = "correct";
    });
    setChoiceStates(states);

    if (isCorrect) {
      updateWord(current, "genderCorrect", 1);
      setStreak((s) => s + 1);
    } else {
      updateWord(current, "genderWrong", 1);
      setStreak(0);
    }
    setTimeout(nextCard, 1200);
  };

  if (words.length === 0) {
    return (
      <div className="fade-in" style={{ paddingTop: 8, textAlign: "center" }}>
        <h1 style={{ marginBottom: 16 }}>Vocabeln</h1>
        <div className="card" style={{ padding: 32 }}>
          <div style={{ fontSize: 40, marginBottom: 8, position: "relative" }}>{"\u{1F4DD}"}</div>
          <p style={{ color: "var(--ink2)", fontSize: 15, position: "relative" }}>Add some words first to start practicing!</p>
        </div>
      </div>
    );
  }

  const activeCount = allActive ? availableCategories.length : activeCategories.size;

  return (
    <div className="fade-in" style={{ paddingTop: 8 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
        <h1>Vocabeln</h1>
        {sessionCount > 0 && (
          <div className="streak-badge">
            {"\u{1F525}"} {streak}
          </div>
        )}
      </div>

      <div className="mode-tabs" style={{ marginBottom: 8 }}>
        <button className={`mode-tab ${mode === "type" ? "active" : ""}`} onClick={() => setMode("type")}>Type</button>
        <button className={`mode-tab ${mode === "choice" ? "active" : ""}`} onClick={() => setMode("choice")}>Choice</button>
        <button className={`mode-tab ${mode === "gender" ? "active" : ""}`} onClick={() => setMode("gender")}>der/die/das</button>
      </div>

      {mode !== "gender" && (
        <div className="mode-tabs" style={{ marginBottom: 8 }}>
          <button
            className={`mode-tab ${directionMode === "de>fr" ? "active" : ""}`}
            onClick={() => changeDirectionMode("de>fr")}
          >
            DE {"→"} FR
          </button>
          <button
            className={`mode-tab ${directionMode === "fr>de" ? "active" : ""}`}
            onClick={() => changeDirectionMode("fr>de")}
          >
            FR {"→"} DE
          </button>
          <button
            className={`mode-tab ${directionMode === "both" ? "active" : ""}`}
            onClick={() => changeDirectionMode("both")}
          >
            Both
          </button>
        </div>
      )}

      {availableCategories.length > 1 && (
        <div style={{ marginBottom: 20 }}>
          <button
            className="filter-toggle"
            onClick={() => setShowFilters((v) => !v)}
            aria-expanded={showFilters}
          >
            <span>
              {"\u{1F4C2}"} {allActive ? "Alle Kategorien" : `${activeCount} von ${availableCategories.length} Kategorien`}
            </span>
            <span className="filter-caret" aria-hidden="true">{showFilters ? "▴" : "▾"}</span>
          </button>
          {showFilters && (
            <div className="cat-chips fade-in" style={{ marginTop: 8 }}>
              <button className={`cat-chip ${allActive ? "active" : ""}`} onClick={setAll}>Alle</button>
              {availableCategories.map((c) => (
                <button
                  key={c.id}
                  className={`cat-chip ${!allActive && activeCategories.has(c.id) ? "active" : ""}`}
                  onClick={() => toggleCategory(c.id)}
                >
                  {c.name}
                </button>
              ))}
            </div>
          )}
        </div>
      )}

      {!hasEnough ? (
        <div className="card" style={{ padding: 28 }}>
          <p style={{ color: "var(--ink2)", fontSize: 14, position: "relative" }}>
            {mode === "choice"
              ? "You need at least 4 words for multiple choice."
              : mode === "gender"
                ? "Add words with articles (e.g. 'der Hund') to practice gender."
                : "No words in selected categories."}
          </p>
        </div>
      ) : current ? (
        <div className="fade-in" key={current.de + current.fr + mode + direction + sessionCount}>
          <div className="card" style={{ marginBottom: 20, minHeight: 140, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            {result && (
              <div className={`result-overlay ${result === "correct" ? "result-correct" : result === "partial" ? "result-partial" : "result-wrong"}`}>
                <span style={{ fontSize: 56 }}>{result === "correct" ? "\u2713" : result === "partial" ? "~" : "\u2717"}</span>
              </div>
            )}
            <div className="card-hint" style={{ marginBottom: 12, position: "relative" }}>
              {mode === "gender" ? "What article?" : direction === "de>fr" ? "Deutsch → Français" : "Français → Deutsch"}
            </div>
            <div className="card-word">
              {mode === "gender"
                ? current.de
                : direction === "de>fr"
                  ? `${current.article ? current.article + " " : ""}${current.de}`
                  : current.fr}
            </div>
            {(() => {
              const lv = mode === "gender" ? getGenderLevel(current) : getLevel(current);
              const lvInfo = LEVELS[lv];
              const isNew = mode === "gender"
                ? (current.genderCorrect || 0) === 0 && (current.genderWrong || 0) === 0
                : (current.correct || 0) === 0 && (current.wrong || 0) === 0;
              const net = mode === "gender"
                ? (current.genderCorrect || 0) - (current.genderWrong || 0)
                : (current.correct || 0) - (current.wrong || 0);
              const progress = Math.max(0, Math.min(net / 4, 1));
              return (
                <div className="word-status">
                  {isNew ? (
                    <span className="word-status-badge" style={{ background: lvInfo.bg, color: lvInfo.color }}>New</span>
                  ) : (
                    <>
                      <div className="word-status-bar-track">
                        <div className="word-status-bar-fill" style={{ width: `${progress * 100}%`, background: lvInfo.color }} />
                      </div>
                      <span style={{ color: lvInfo.color }}>{net}/4</span>
                    </>
                  )}
                </div>
              );
            })()}
          </div>

          {mode === "type" && (
            <div>
              <input
                ref={inputRef}
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && (result === "wrong" ? nextCard() : result === "partial" ? null : handleTypeSubmit())}
                placeholder={direction === "de>fr" ? "Type in French..." : "Type in German..."}
                disabled={result === "correct" || result === "partial"}
                autoFocus
              />
              {result === "partial" && (
                <div className="fade-in" style={{ marginTop: 12, padding: 14, borderRadius: 12, background: "#fef5e7", textAlign: "center" }}>
                  <div style={{ fontSize: 13, color: "var(--accent)", fontWeight: 600, marginBottom: 4 }}>
                    {partialReason}
                  </div>
                  <div style={{ fontFamily: "'Lora', serif", fontSize: 24, color: "var(--ink)" }}>
                    {correctAnswer}
                  </div>
                </div>
              )}
              {result === "wrong" && (
                <div className="fade-in" style={{ marginTop: 12, padding: 14, borderRadius: 12, background: "#fdecea", textAlign: "center" }}>
                  <div style={{ fontSize: 13, color: "var(--red)", fontWeight: 600, marginBottom: 4 }}>
                    Correct answer:
                  </div>
                  <div style={{ fontFamily: "'Lora', serif", fontSize: 24, color: "var(--ink)" }}>
                    {correctAnswer}
                  </div>
                </div>
              )}
              <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                {result === "wrong" ? (
                  <button className="btn btn-secondary" onClick={nextCard}>Next {"\u2192"}</button>
                ) : result === null ? (
                  <>
                    <button className="btn btn-outline btn-small" onClick={() => {
                      const rawExpected = direction === "de>fr" ? current.fr : current.de;
                      const displayExpected = direction === "fr>de" && current.article
                        ? current.article + " " + current.de
                        : rawExpected;
                      setResult("wrong");
                      setCorrectAnswer(displayExpected);
                      setSessionCount((c) => c + 1);
                      updateWord(current, "wrong", 1);
                      setStreak(0);
                    }}>Show answer</button>
                    <button className="btn btn-primary" style={{ flex: 1 }} onClick={handleTypeSubmit} disabled={!input.trim()}>Check</button>
                  </>
                ) : null}
              </div>
            </div>
          )}

          {mode === "choice" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {choices.map((c, i) => (
                <button
                  key={i}
                  className={`choice-btn ${choiceStates[i] === "correct" ? "choice-correct" : ""} ${choiceStates[i] === "wrong" ? "choice-wrong" : ""}`}
                  onClick={() => handleChoice(c, i)}
                  disabled={result !== null}
                >
                  {direction === "de>fr" ? c.fr : `${c.article ? c.article + " " : ""}${c.de}`}
                </button>
              ))}
            </div>
          )}

          {mode === "gender" && (
            <div style={{ display: "flex", gap: 10 }}>
              {["der", "die", "das"].map((g) => (
                <button
                  key={g}
                  className={`gender-btn ${choiceStates[g] === "correct" ? "choice-correct" : ""} ${choiceStates[g] === "wrong" ? "choice-wrong" : ""}`}
                  onClick={() => handleGender(g)}
                  disabled={result !== null}
                >
                  {g}
                </button>
              ))}
            </div>
          )}
        </div>
      ) : null}
    </div>
  );
}

/* ── stats ────────────────────────────────────────────────────── */
function StatsView({ words, categories, save }) {
  const [confirm, setConfirm] = useState(false);
  const [statsFilter, setStatsFilter] = useState(-1); // -1 = all, 0-3 = level

  const counts = [0, 0, 0, 0];
  words.forEach((w) => counts[getLevel(w)]++);
  const genderCounts = [0, 0, 0, 0];
  words.filter((w) => w.article).forEach((w) => genderCounts[getGenderLevel(w)]++);
  const total = words.length;
  const withArticle = words.filter((w) => w.article).length;

  const catNames = {};
  categories.forEach((c) => { catNames[c.id] = c.name; });

  // Grammar-exercise mastery from the unified SR store (per-item levels).
  const srStore = loadSRStore();
  const grammarStats = MODULES.filter((m) => m.sr).map((m) => {
    const items = m.sr.items();
    const dist = [0, 0, 0, 0];
    let seen = 0;
    items.forEach((id) => {
      const r = srGet(srStore, id);
      dist[srLevel(r)]++;
      if ((r.correct || 0) + (r.wrong || 0) > 0) seen++;
    });
    return { id: m.id, icon: m.icon, label: m.label, dist, total: items.length, mastered: dist[3], seen };
  });
  const anyGrammarSeen = grammarStats.some((g) => g.seen > 0);

  const resetAll = () => {
    const next = words.map((w) => ({ ...w, correct: 0, wrong: 0, genderCorrect: 0, genderWrong: 0, lastPracticed: 0 }));
    localStorage.removeItem(SR_KEY);
    MODULES.forEach((m) => localStorage.removeItem(MODULE_STATS_KEY(m.id)));
    save(next);
    setConfirm(false);
  };

  if (words.length === 0 && !anyGrammarSeen) {
    return (
      <div className="fade-in" style={{ paddingTop: 40, textAlign: "center" }}>
        <h1 style={{ marginBottom: 16 }}>Stats</h1>
        <div className="card" style={{ padding: 32 }}>
          <div style={{ fontSize: 40, marginBottom: 8, position: "relative" }}>{"\u{1F4CA}"}</div>
          <p style={{ color: "var(--ink2)", fontSize: 15, position: "relative" }}>Nothing to show yet. Add and practice some words!</p>
        </div>
      </div>
    );
  }

  return (
    <div className="fade-in" style={{ paddingTop: 32 }}>
      <h1 style={{ marginBottom: 20 }}>Stats</h1>

      {total > 0 && (
      <div className="card" style={{ padding: 20, marginBottom: 16 }}>
        <h2 style={{ fontSize: 20, marginBottom: 14, position: "relative" }}>Translation Progress</h2>
        <div style={{ display: "flex", flexDirection: "column", gap: 10, position: "relative" }}>
          {LEVELS.map((lv, i) => (
            <div key={i}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 600, marginBottom: 4 }}>
                <span style={{ color: lv.color }}>{lv.label}</span>
                <span style={{ color: "var(--ink2)" }}>{counts[i]}</span>
              </div>
              <div style={{ background: "var(--warm)", borderRadius: 4, height: 8, overflow: "hidden" }}>
                <div
                  className="level-bar"
                  style={{ width: total ? `${(counts[i] / total) * 100}%` : "0%", background: lv.color }}
                />
              </div>
            </div>
          ))}
        </div>
      </div>
      )}

      {withArticle > 0 && (
        <div className="card" style={{ padding: 20, marginBottom: 16 }}>
          <h2 style={{ fontSize: 20, marginBottom: 14, position: "relative" }}>Gender Progress</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, position: "relative" }}>
            {LEVELS.map((lv, i) => (
              <div key={i}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 600, marginBottom: 4 }}>
                  <span style={{ color: lv.color }}>{lv.label}</span>
                  <span style={{ color: "var(--ink2)" }}>{genderCounts[i]}</span>
                </div>
                <div style={{ background: "var(--warm)", borderRadius: 4, height: 8, overflow: "hidden" }}>
                  <div
                    className="level-bar"
                    style={{ width: withArticle ? `${(genderCounts[i] / withArticle) * 100}%` : "0%", background: lv.color }}
                  />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {grammarStats.length > 0 && (
        <div className="card" style={{ padding: 20, marginBottom: 16 }}>
          <h2 style={{ fontSize: 20, marginBottom: 4, position: "relative" }}>Übungen</h2>
          <div style={{ fontSize: 12, color: "var(--ink2)", marginBottom: 16, position: "relative" }}>
            Grammatik-Fortschritt (Auto-Modus)
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 14, position: "relative" }}>
            {grammarStats.map((g) => (
              <div key={g.id}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 600, marginBottom: 5 }}>
                  <span><span aria-hidden="true">{g.icon}</span> {g.label}</span>
                  <span style={{ color: "var(--ink2)" }}>{g.mastered}/{g.total} gemeistert</span>
                </div>
                <div style={{ display: "flex", height: 8, borderRadius: 4, overflow: "hidden", background: "var(--warm)" }}>
                  {LEVELS.map((lv, i) => g.dist[i] > 0 && (
                    <div key={i} title={`${lv.label}: ${g.dist[i]}`} style={{ width: `${(g.dist[i] / g.total) * 100}%`, background: lv.color }} />
                  ))}
                </div>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginTop: 16, position: "relative" }}>
            {LEVELS.map((lv, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "var(--ink2)" }}>
                <span style={{ width: 10, height: 10, borderRadius: 3, background: lv.color, display: "inline-block" }} />
                {lv.label}
              </div>
            ))}
          </div>
        </div>
      )}

      {total > 0 && (
      <div className="card" style={{ padding: 20, marginBottom: 16 }}>
        <h2 style={{ fontSize: 20, marginBottom: 14, position: "relative" }}>Word Details</h2>
        <div className="cat-chips" style={{ marginBottom: 12, position: "relative" }}>
          <button className={`cat-chip ${statsFilter === -1 ? "active" : ""}`} onClick={() => setStatsFilter(-1)}>
            All ({total})
          </button>
          {LEVELS.map((lv, i) => counts[i] > 0 && (
            <button
              key={i}
              className={`cat-chip ${statsFilter === i ? "active" : ""}`}
              onClick={() => setStatsFilter(i)}
              style={statsFilter === i ? { borderColor: lv.color, color: lv.color, background: lv.bg } : {}}
            >
              {lv.label} ({counts[i]})
            </button>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 300, overflowY: "auto", position: "relative" }}>
          {[...words]
            .sort((a, b) => getLevel(a) - getLevel(b))
            .filter((w) => statsFilter === -1 || getLevel(w) === statsFilter)
            .map((w, i) => {
              const lv = getLevel(w);
              return (
                <div key={i} className="word-row" style={{ fontSize: 13 }}>
                  <div style={{ flex: 1 }}>
                    <span style={{ fontWeight: 600 }}>
                      {w.article && <span style={{ color: "var(--accent2)" }}>{w.article} </span>}
                      {w.de}
                    </span>
                    <span style={{ color: "var(--ink2)", margin: "0 4px" }}>{"\u2192"}</span>
                    <span>{w.fr}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    {catNames[w.category] && (
                      <span style={{ fontSize: 10, color: "var(--ink2)", background: "var(--warm)", padding: "1px 6px", borderRadius: 4 }}>
                        {catNames[w.category]}
                      </span>
                    )}
                    <span
                      style={{
                        fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 6,
                        background: LEVELS[lv].bg, color: LEVELS[lv].color,
                      }}
                    >
                      {LEVELS[lv].label}
                    </span>
                  </div>
                </div>
              );
            })}
        </div>
      </div>
      )}

      <button className="btn btn-outline" style={{ color: "var(--red)", borderColor: "#fdecea" }} onClick={() => setConfirm(true)}>
        Reset all progress
      </button>

      {confirm && (
        <div className="confirm-modal" onClick={() => setConfirm(false)}>
          <div className="confirm-box" onClick={(e) => e.stopPropagation()}>
            <h2 style={{ marginBottom: 8 }}>Reset progress?</h2>
            <p style={{ fontSize: 14, color: "var(--ink2)", marginBottom: 20 }}>
              This resets all progress — vocabulary and exercises. Your word list stays intact.
            </p>
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn btn-secondary" onClick={() => setConfirm(false)}>Cancel</button>
              <button className="btn btn-red" onClick={resetAll}>Reset</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── clock ────────────────────────────────────────────────────── */
function ClockFace({ hour, minute }) {
  const size = 240;
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2 - 10;
  const toXY = (deg, len) => {
    const rad = (deg - 90) * Math.PI / 180;
    return [cx + len * Math.cos(rad), cy + len * Math.sin(rad)];
  };
  const hourAngle = ((hour % 12) + minute / 60) * 30;
  const minuteAngle = minute * 6;
  const [hx, hy] = toXY(hourAngle, r * 0.52);
  const [mx, my] = toXY(minuteAngle, r * 0.78);

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block" }}>
      <circle cx={cx} cy={cy} r={r} fill="#fffdf8" stroke="#2c2416" strokeWidth="3" />
      {Array.from({ length: 60 }, (_, i) => {
        const isHour = i % 5 === 0;
        const [x1, y1] = toXY(i * 6, r - (isHour ? 12 : 5));
        const [x2, y2] = toXY(i * 6, r - 2);
        return (
          <line
            key={i}
            x1={x1} y1={y1} x2={x2} y2={y2}
            stroke="#2c2416"
            strokeWidth={isHour ? 3 : 1}
            strokeLinecap="round"
          />
        );
      })}
      {Array.from({ length: 12 }, (_, i) => {
        const n = i + 1;
        const [tx, ty] = toXY(n * 30, r - 28);
        return (
          <text
            key={n}
            x={tx} y={ty}
            textAnchor="middle"
            dominantBaseline="central"
            fontFamily="Lora, serif"
            fontSize="20"
            fontWeight="700"
            fill="#2c2416"
          >{n}</text>
        );
      })}
      <line x1={cx} y1={cy} x2={hx} y2={hy} stroke="#2c2416" strokeWidth="7" strokeLinecap="round" />
      <line x1={cx} y1={cy} x2={mx} y2={my} stroke="#c45a3c" strokeWidth="4" strokeLinecap="round" />
      <circle cx={cx} cy={cy} r="6" fill="#2c2416" />
      <circle cx={cx} cy={cy} r="2" fill="#c45a3c" />
    </svg>
  );
}
