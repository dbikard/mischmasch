/* ── helpers ─────────────────────────────────────────────────── */
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function parseTable(text, category) {
  return text
    .trim()
    .split("\n")
    .filter(Boolean)
    .map((line) => {
      const parts = line.split(/\t|\s*\|\s*|;\s*|\s{2,}/);
      if (parts.length < 2) return null;
      let de = parts[0].trim();
      const fr = parts[1].trim();
      if (!de || !fr || /^[-=:]+$/.test(de) || /^[-=:]+$/.test(fr)) return null;
      let article = null;
      const m = de.match(/^(der|die|das)\s+/i);
      if (m) {
        article = m[1].toLowerCase();
        de = de.slice(m[0].length);
      }
      return { de, fr, article, correct: 0, wrong: 0, genderCorrect: 0, genderWrong: 0, category: category || "my-words" };
    })
    .filter(Boolean);
}

function getLevel(w) {
  const net = (w.correct || 0) - (w.wrong || 0);
  if (net >= 4) return 3;
  if (net >= 1) return 2;
  if (net >= 0) return 1;
  return 0;
}

function getGenderLevel(w) {
  const net = (w.genderCorrect || 0) - (w.genderWrong || 0);
  if (net >= 4) return 3;
  if (net >= 1) return 2;
  if (net >= 0) return 1;
  return 0;
}

const LEVELS = [
  { label: "Struggling", color: "#c0392b", bg: "#fdecea" },
  { label: "New", color: "#7f8c8d", bg: "#f4f4f4" },
  { label: "Learning", color: "#d4820a", bg: "#fef5e7" },
  { label: "Mastered", color: "#1e8449", bg: "#e8f8f0" },
];

function weightedPick(words, levelFn) {
  const weights = words.map((w) => [8, 5, 2, 1][levelFn(w)]);
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < words.length; i++) {
    r -= weights[i];
    if (r <= 0) return words[i];
  }
  return words[words.length - 1];
}

function pickChoices(correct, all, field, count = 4) {
  const others = shuffle(all.filter((w) => w[field] !== correct[field]));
  return shuffle([correct, ...others.slice(0, count - 1)]);
}

function wordKey(w) {
  return (w.de + "|" + w.fr).toLowerCase();
}

/* ── main component ──────────────────────────────────────────── */
function VocabTrainer() {
  const [words, setWords] = useState([]);
  const [categories, setCategories] = useState([]);
  const [view, setView] = useState("home");
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    const storedCats = JSON.parse(localStorage.getItem(CATEGORIES_KEY) || "null");

    fetch('./words/index.json')
      .then((r) => r.json())
      .then((index) => {
        const cats = [...index, { id: "my-words", name: "My words" }];
        setCategories(cats);
        localStorage.setItem(CATEGORIES_KEY, JSON.stringify(cats));

        return Promise.all(
          index.map((cat) =>
            fetch('./words/' + cat.file)
              .then((r) => r.text())
              .then((text) => parseTable(text, cat.id))
          )
        );
      })
      .then((results) => {
        const fetched = results.flat();
        const existingMap = {};
        if (stored) {
          stored.forEach((w) => { existingMap[wordKey(w)] = w; });
        }
        // Merge: keep existing scores, add new words from files
        const merged = [];
        const seen = new Set();
        // First, add all fetched words (with existing scores if available)
        for (const w of fetched) {
          const k = wordKey(w);
          if (seen.has(k)) continue;
          seen.add(k);
          if (existingMap[k]) {
            merged.push({ ...existingMap[k], category: w.category });
          } else {
            merged.push(w);
          }
        }
        // Then, add any user-added words from localStorage not in fetched files
        if (stored) {
          for (const w of stored) {
            const k = wordKey(w);
            if (!seen.has(k)) {
              seen.add(k);
              merged.push({ ...w, category: w.category || "my-words" });
            }
          }
        }
        setWords(merged);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
        setLoading(false);
      })
      .catch(() => {
        // Offline or fetch failed — use stored data
        if (stored) setWords(stored);
        if (storedCats) setCategories(storedCats);
        else setCategories([{ id: "my-words", name: "My words" }]);
        setLoading(false);
      });
  }, []);

  const save = useCallback((next) => {
    setWords(next);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
  }, []);

  if (loading) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", fontFamily: "'Lora', serif", fontSize: 28, color: "#5c4f3d" }}>
      <style>{CSS}</style>
      Loading...
    </div>
  );

  return (
    <>
      <style>{CSS}</style>
      <div className="app">
        {view === "home" && <HomeView words={words} categories={categories} setView={setView} />}
        {view === "add" && <AddView words={words} save={save} />}
        {view === "practice" && <PracticeView words={words} categories={categories} save={save} />}
        {view === "stats" && <StatsView words={words} categories={categories} save={save} />}
      </div>
      <Nav view={view} setView={setView} />
    </>
  );
}

/* ── home ────────────────────────────────────────────────────── */
function HomeView({ words, categories, setView }) {
  const withArticle = words.filter((w) => w.article);
  const catCounts = {};
  words.forEach((w) => { catCounts[w.category] = (catCounts[w.category] || 0) + 1; });

  return (
    <div className="fade-in" style={{ paddingTop: 40 }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <h1 style={{ fontSize: 38, marginBottom: 4 }}>MischMasch</h1>
        <p style={{ color: "var(--ink2)", fontSize: 14, fontWeight: 500 }}>Deutsch ↔ Français</p>
      </div>

      <div className="card" style={{ marginBottom: 20, padding: 24 }}>
        <div style={{ fontSize: 48, marginBottom: 4, position: "relative" }}>{words.length === 0 ? "\u{1F4DD}" : "\u{1F4DA}"}</div>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 24, fontWeight: 700, position: "relative" }}>
          {words.length} {words.length === 1 ? "word" : "words"}
        </div>
        {categories.filter((c) => catCounts[c.id]).length > 1 && (
          <div style={{ fontSize: 13, color: "var(--ink2)", marginTop: 6, position: "relative" }}>
            {categories.filter((c) => catCounts[c.id]).map((c) => `${c.name} (${catCounts[c.id]})`).join(" · ")}
          </div>
        )}
        {withArticle.length > 0 && (
          <div style={{ fontSize: 13, color: "var(--ink2)", marginTop: 4, position: "relative" }}>
            {withArticle.length} with article
          </div>
        )}
      </div>

      {words.length === 0 ? (
        <button className="btn btn-primary" onClick={() => setView("add")}>
          Add your first words
        </button>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <button className="btn btn-primary" onClick={() => setView("practice")}>
            Start practicing
          </button>
          <button className="btn btn-secondary" onClick={() => setView("add")}>
            Add more words
          </button>
        </div>
      )}
    </div>
  );
}

/* ── add words ───────────────────────────────────────────────── */
function AddView({ words, save }) {
  const [text, setText] = useState("");
  const [preview, setPreview] = useState(null);
  const [showList, setShowList] = useState(false);
  const [deleteId, setDeleteId] = useState(null);

  const handleParse = () => {
    const parsed = parseTable(text, "my-words");
    setPreview(parsed.length > 0 ? parsed : []);
  };

  const handleConfirm = () => {
    if (!preview || preview.length === 0) return;
    const merged = [...words];
    for (const p of preview) {
      const exists = merged.find((w) => w.de.toLowerCase() === p.de.toLowerCase() && w.fr.toLowerCase() === p.fr.toLowerCase());
      if (!exists) merged.push(p);
    }
    save(merged);
    setText("");
    setPreview(null);
  };

  const handleDelete = (idx) => {
    save(words.filter((_, i) => i !== idx));
    setDeleteId(null);
  };

  return (
    <div className="fade-in" style={{ paddingTop: 32 }}>
      <h1 style={{ marginBottom: 20 }}>Add Words</h1>

      <div style={{ marginBottom: 8, fontSize: 13, color: "var(--ink2)", fontWeight: 500 }}>
        Paste your vocabulary (German ; French):
      </div>
      <textarea
        value={text}
        onChange={(e) => { setText(e.target.value); setPreview(null); }}
        placeholder={"der Hund ; le chien\ndie Katze ; le chat\ndas Haus ; la maison"}
      />
      <div style={{ marginTop: 10 }}>
        <button className="btn btn-primary" onClick={handleParse} disabled={!text.trim()}>
          Parse
        </button>
      </div>

      {preview !== null && (
        <div className="fade-in" style={{ marginTop: 20 }}>
          {preview.length === 0 ? (
            <div className="card" style={{ padding: 20 }}>
              <div style={{ position: "relative", color: "var(--red)", fontWeight: 600 }}>
                No word pairs found. Try tab, pipe, or semicolon as separator.
              </div>
            </div>
          ) : (
            <>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 10, color: "var(--accent)" }}>
                Found {preview.length} word pair{preview.length !== 1 ? "s" : ""}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 14 }}>
                {preview.map((p, i) => (
                  <div key={i} className="word-row" style={{ fontSize: 14 }}>
                    <span style={{ fontWeight: 600 }}>
                      {p.article && <span style={{ color: "var(--accent2)" }}>{p.article} </span>}
                      {p.de}
                    </span>
                    <span style={{ color: "var(--ink2)" }}>{"\u2192"}</span>
                    <span>{p.fr}</span>
                  </div>
                ))}
              </div>
              <button className="btn btn-green" onClick={handleConfirm}>
                Add {preview.length} word{preview.length !== 1 ? "s" : ""}
              </button>
            </>
          )}
        </div>
      )}

      {words.length > 0 && (
        <div style={{ marginTop: 32 }}>
          <button className="btn btn-outline btn-small" style={{ marginBottom: 12 }} onClick={() => setShowList(!showList)}>
            {showList ? "Hide" : "Show"} word list ({words.length})
          </button>
          {showList && (
            <div className="fade-in" style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {words.map((w, i) => (
                <div key={i} className="word-row" style={{ fontSize: 14 }}>
                  <div style={{ flex: 1 }}>
                    <span style={{ fontWeight: 600 }}>
                      {w.article && <span style={{ color: "var(--accent2)" }}>{w.article} </span>}
                      {w.de}
                    </span>
                    <span style={{ color: "var(--ink2)", margin: "0 6px" }}>{"\u2192"}</span>
                    <span>{w.fr}</span>
                  </div>
                  <button
                    onClick={() => setDeleteId(i)}
                    style={{ background: "none", border: "none", color: "var(--red)", cursor: "pointer", fontSize: 18, padding: "0 4px" }}
                  >
                    {"\u00D7"}
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {deleteId !== null && (
        <div className="confirm-modal" onClick={() => setDeleteId(null)}>
          <div className="confirm-box" onClick={(e) => e.stopPropagation()}>
            <h2 style={{ marginBottom: 8 }}>Delete word?</h2>
            <p style={{ fontSize: 14, color: "var(--ink2)", marginBottom: 20 }}>
              {words[deleteId]?.article && `${words[deleteId].article} `}{words[deleteId]?.de} {"\u2192"} {words[deleteId]?.fr}
            </p>
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn btn-secondary" onClick={() => setDeleteId(null)}>Cancel</button>
              <button className="btn btn-red" onClick={() => handleDelete(deleteId)}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── practice ────────────────────────────────────────────────── */
function PracticeView({ words, categories, save }) {
  const [mode, setMode] = useState("type");
  const [current, setCurrent] = useState(null);
  const [direction, setDirection] = useState("de>fr");
  const [choices, setChoices] = useState([]);
  const [input, setInput] = useState("");
  const [result, setResult] = useState(null);
  const [correctAnswer, setCorrectAnswer] = useState("");
  const [partialReason, setPartialReason] = useState("");
  const [choiceStates, setChoiceStates] = useState({});
  const [streak, setStreak] = useState(0);
  const [sessionCount, setSessionCount] = useState(0);
  const inputRef = useRef(null);

  // Category filter — default: all active
  const [activeCategories, setActiveCategories] = useState(() => {
    const stored = JSON.parse(localStorage.getItem(FILTER_KEY) || "null");
    return stored ? new Set(stored) : null; // null = all
  });

  const availableCategories = useMemo(() => {
    const catIds = new Set(words.map((w) => w.category));
    return categories.filter((c) => catIds.has(c.id));
  }, [words, categories]);

  const allActive = activeCategories === null || activeCategories.size === availableCategories.length;

  const filteredWords = useMemo(() => {
    if (allActive) return words;
    return words.filter((w) => activeCategories.has(w.category));
  }, [words, activeCategories, allActive]);

  const toggleCategory = (catId) => {
    let next;
    if (allActive) {
      // Switching from "all" to just this one
      next = new Set([catId]);
    } else if (activeCategories.has(catId)) {
      next = new Set(activeCategories);
      next.delete(catId);
      if (next.size === 0) next = null; // back to all
    } else {
      next = new Set(activeCategories);
      next.add(catId);
      if (next.size === availableCategories.length) next = null; // all selected = all
    }
    setActiveCategories(next);
    localStorage.setItem(FILTER_KEY, JSON.stringify(next ? [...next] : null));
  };

  const setAll = () => {
    setActiveCategories(null);
    localStorage.setItem(FILTER_KEY, "null");
  };

  const wordsWithArticle = filteredWords.filter((w) => w.article);
  const hasEnough = mode === "gender" ? wordsWithArticle.length >= 1 : (mode === "choice" ? filteredWords.length >= 4 : filteredWords.length >= 1);

  const nextCard = useCallback(() => {
    setResult(null);
    setInput("");
    setChoiceStates({});
    setCorrectAnswer("");
    setPartialReason("");

    if (mode === "gender") {
      const pool = filteredWords.filter((w) => w.article);
      if (pool.length === 0) return;
      const w = weightedPick(pool, getGenderLevel);
      setCurrent(w);
    } else {
      const dir = Math.random() < 0.5 ? "de>fr" : "fr>de";
      setDirection(dir);
      const w = weightedPick(filteredWords, getLevel);
      setCurrent(w);
      if (mode === "choice") {
        const field = dir === "de>fr" ? "fr" : "de";
        setChoices(pickChoices(w, filteredWords, field));
      }
    }
    setTimeout(() => inputRef.current?.focus(), 100);
  }, [filteredWords, mode]);

  useEffect(() => {
    if (hasEnough) nextCard();
  }, [mode, activeCategories]);

  const updateWord = useCallback((word, field, delta) => {
    const next = words.map((w) =>
      w.de === word.de && w.fr === word.fr ? { ...w, [field]: (w[field] || 0) + delta } : w
    );
    save(next);
  }, [words, save]);

  const normalizeText = (s) => s.toLowerCase().replace(/ä/g, "ae").replace(/ö/g, "oe").replace(/ü/g, "ue").replace(/ß/g, "ss").replace(/[éèê]/g, "e").replace(/[àâ]/g, "a").replace(/[ùû]/g, "u").replace(/[ôò]/g, "o").replace(/[îï]/g, "i").replace(/ç/g, "c").replace(/œ/g, "oe").replace(/'/g, "'");

  const handleTypeSubmit = () => {
    if (!input.trim() || result) return;
    const rawExpected = direction === "de>fr" ? current.fr : current.de;
    const displayExpected = direction === "fr>de" && current.article
      ? current.article + " " + current.de
      : rawExpected;
    const alternatives = rawExpected.split("/").map((s) => s.trim().toLowerCase());
    // Also accept "article + word" when translating to German
    if (direction === "fr>de" && current.article) {
      rawExpected.split("/").forEach((s) => {
        alternatives.push((current.article + " " + s.trim()).toLowerCase());
      });
    }
    const userInput = input.trim().toLowerCase();
    const wordAlts = rawExpected.split("/").map((s) => s.trim().toLowerCase());
    const isCorrect = alternatives.some((alt) => userInput === alt || normalizeText(userInput) === normalizeText(alt));

    // Check partial matches for fr>de when word has an article
    let partialType = null; // "no-article" or "wrong-article"
    if (direction === "fr>de" && current.article) {
      if (isCorrect) {
        // Check if they typed just the word without article
        const hasArticle = userInput.match(/^(der|die|das)\s+/i);
        if (!hasArticle) {
          partialType = "no-article";
        }
      } else {
        // Check if they typed wrong article but correct word
        const articleMatch = userInput.match(/^(der|die|das)\s+(.+)$/i);
        if (articleMatch) {
          const typedWord = articleMatch[2].toLowerCase();
          const isWordCorrect = wordAlts.some((alt) => typedWord === alt || normalizeText(typedWord) === normalizeText(alt));
          if (isWordCorrect) partialType = "wrong-article";
        }
      }
    }

    if (isCorrect && !partialType) {
      setResult("correct");
      setCorrectAnswer(displayExpected);
      setSessionCount((c) => c + 1);
      updateWord(current, "correct", 2);
      setStreak((s) => s + 1);
      setTimeout(nextCard, 900);
    } else if (partialType === "no-article") {
      setResult("partial");
      setPartialReason("Don't forget the article!");
      setCorrectAnswer(displayExpected);
      setSessionCount((c) => c + 1);
      updateWord(current, "correct", 0.5);
      setTimeout(nextCard, 1500);
    } else if (partialType === "wrong-article") {
      setResult("partial");
      setPartialReason("Correct word, but wrong article!");
      setCorrectAnswer(displayExpected);
      setSessionCount((c) => c + 1);
      updateWord(current, "correct", 0.5);
      updateWord(current, "genderWrong", 1);
      setTimeout(nextCard, 1500);
    } else {
      setResult("wrong");
      setCorrectAnswer(displayExpected);
      setSessionCount((c) => c + 1);
      updateWord(current, "wrong", 1);
      setStreak(0);
    }
  };

  const handleChoice = (chosen, idx) => {
    if (result) return;
    const field = direction === "de>fr" ? "fr" : "de";
    const isCorrect = chosen[field] === current[field];
    const states = {};
    if (isCorrect) {
      states[idx] = "correct";
    } else {
      states[idx] = "wrong";
      const correctIdx = choices.findIndex((c) => c[field] === current[field]);
      states[correctIdx] = "correct";
    }
    setChoiceStates(states);
    setResult(isCorrect ? "correct" : "wrong");
    setSessionCount((c) => c + 1);
    if (isCorrect) {
      updateWord(current, "correct", 1);
      setStreak((s) => s + 1);
    } else {
      updateWord(current, "wrong", 1);
      setStreak(0);
    }
    setTimeout(nextCard, 1200);
  };

  const handleGender = (chosen) => {
    if (result) return;
    const isCorrect = chosen === current.article;
    setResult(isCorrect ? "correct" : "wrong");
    setCorrectAnswer(current.article);
    setSessionCount((c) => c + 1);

    const states = {};
    ["der", "die", "das"].forEach((g) => {
      if (g === chosen && !isCorrect) states[g] = "wrong";
      if (g === current.article) states[g] = "correct";
    });
    setChoiceStates(states);

    if (isCorrect) {
      updateWord(current, "genderCorrect", 1);
      setStreak((s) => s + 1);
    } else {
      updateWord(current, "genderWrong", 1);
      setStreak(0);
    }
    setTimeout(nextCard, 1200);
  };

  if (words.length === 0) {
    return (
      <div className="fade-in" style={{ paddingTop: 40, textAlign: "center" }}>
        <h1 style={{ marginBottom: 16 }}>Practice</h1>
        <div className="card" style={{ padding: 32 }}>
          <div style={{ fontSize: 40, marginBottom: 8, position: "relative" }}>{"\u{1F4DD}"}</div>
          <p style={{ color: "var(--ink2)", fontSize: 15, position: "relative" }}>Add some words first to start practicing!</p>
        </div>
      </div>
    );
  }

  return (
    <div className="fade-in" style={{ paddingTop: 32 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
        <h1>Practice</h1>
        {sessionCount > 0 && (
          <div className="streak-badge">
            {"\u{1F525}"} {streak}
          </div>
        )}
      </div>

      {availableCategories.length > 1 && (
        <div className="cat-chips" style={{ marginBottom: 12 }}>
          <button className={`cat-chip ${allActive ? "active" : ""}`} onClick={setAll}>All</button>
          {availableCategories.map((c) => (
            <button
              key={c.id}
              className={`cat-chip ${!allActive && activeCategories.has(c.id) ? "active" : ""}`}
              onClick={() => toggleCategory(c.id)}
            >
              {c.name}
            </button>
          ))}
        </div>
      )}

      <div className="mode-tabs" style={{ marginBottom: 20 }}>
        <button className={`mode-tab ${mode === "type" ? "active" : ""}`} onClick={() => setMode("type")}>Type</button>
        <button className={`mode-tab ${mode === "choice" ? "active" : ""}`} onClick={() => setMode("choice")}>Choice</button>
        <button className={`mode-tab ${mode === "gender" ? "active" : ""}`} onClick={() => setMode("gender")}>der/die/das</button>
      </div>

      {!hasEnough ? (
        <div className="card" style={{ padding: 28 }}>
          <p style={{ color: "var(--ink2)", fontSize: 14, position: "relative" }}>
            {mode === "choice"
              ? "You need at least 4 words for multiple choice."
              : mode === "gender"
                ? "Add words with articles (e.g. 'der Hund') to practice gender."
                : "No words in selected categories."}
          </p>
        </div>
      ) : current ? (
        <div className="fade-in" key={current.de + current.fr + mode + direction + sessionCount}>
          <div className="card" style={{ marginBottom: 20, minHeight: 140, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            {result && (
              <div className={`result-overlay ${result === "correct" ? "result-correct" : result === "partial" ? "result-partial" : "result-wrong"}`}>
                <span style={{ fontSize: 56 }}>{result === "correct" ? "\u2713" : result === "partial" ? "~" : "\u2717"}</span>
              </div>
            )}
            <div className="card-hint" style={{ marginBottom: 12, position: "relative" }}>
              {mode === "gender" ? "What article?" : direction === "de>fr" ? "Deutsch → Français" : "Français → Deutsch"}
            </div>
            <div className="card-word">
              {mode === "gender"
                ? current.de
                : direction === "de>fr"
                  ? `${current.article ? current.article + " " : ""}${current.de}`
                  : current.fr}
            </div>
          </div>

          {mode === "type" && (
            <div>
              <input
                ref={inputRef}
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && (result === "wrong" ? nextCard() : result === "partial" ? null : handleTypeSubmit())}
                placeholder={direction === "de>fr" ? "Type in French..." : "Type in German..."}
                disabled={result === "correct" || result === "partial"}
                autoFocus
              />
              {result === "partial" && (
                <div className="fade-in" style={{ marginTop: 12, padding: 14, borderRadius: 12, background: "#fef5e7", textAlign: "center" }}>
                  <div style={{ fontSize: 13, color: "var(--accent)", fontWeight: 600, marginBottom: 4 }}>
                    {partialReason}
                  </div>
                  <div style={{ fontFamily: "'Lora', serif", fontSize: 24, color: "var(--ink)" }}>
                    {correctAnswer}
                  </div>
                </div>
              )}
              {result === "wrong" && (
                <div className="fade-in" style={{ marginTop: 12, padding: 14, borderRadius: 12, background: "#fdecea", textAlign: "center" }}>
                  <div style={{ fontSize: 13, color: "var(--red)", fontWeight: 600, marginBottom: 4 }}>
                    Correct answer:
                  </div>
                  <div style={{ fontFamily: "'Lora', serif", fontSize: 24, color: "var(--ink)" }}>
                    {correctAnswer}
                  </div>
                </div>
              )}
              <div style={{ marginTop: 12 }}>
                {result === "wrong" ? (
                  <button className="btn btn-secondary" onClick={nextCard}>Next {"\u2192"}</button>
                ) : (
                  <button className="btn btn-primary" onClick={handleTypeSubmit} disabled={!input.trim()}>Check</button>
                )}
              </div>
            </div>
          )}

          {mode === "choice" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {choices.map((c, i) => (
                <button
                  key={i}
                  className={`choice-btn ${choiceStates[i] === "correct" ? "choice-correct" : ""} ${choiceStates[i] === "wrong" ? "choice-wrong" : ""}`}
                  onClick={() => handleChoice(c, i)}
                  disabled={result !== null}
                >
                  {direction === "de>fr" ? c.fr : `${c.article ? c.article + " " : ""}${c.de}`}
                </button>
              ))}
            </div>
          )}

          {mode === "gender" && (
            <div style={{ display: "flex", gap: 10 }}>
              {["der", "die", "das"].map((g) => (
                <button
                  key={g}
                  className={`gender-btn ${choiceStates[g] === "correct" ? "choice-correct" : ""} ${choiceStates[g] === "wrong" ? "choice-wrong" : ""}`}
                  onClick={() => handleGender(g)}
                  disabled={result !== null}
                >
                  {g}
                </button>
              ))}
            </div>
          )}
        </div>
      ) : null}
    </div>
  );
}

/* ── stats ────────────────────────────────────────────────────── */
function StatsView({ words, categories, save }) {
  const [confirm, setConfirm] = useState(false);

  const counts = [0, 0, 0, 0];
  words.forEach((w) => counts[getLevel(w)]++);
  const genderCounts = [0, 0, 0, 0];
  words.filter((w) => w.article).forEach((w) => genderCounts[getGenderLevel(w)]++);
  const total = words.length;
  const withArticle = words.filter((w) => w.article).length;

  const catNames = {};
  categories.forEach((c) => { catNames[c.id] = c.name; });

  const resetAll = () => {
    const next = words.map((w) => ({ ...w, correct: 0, wrong: 0, genderCorrect: 0, genderWrong: 0 }));
    save(next);
    setConfirm(false);
  };

  if (words.length === 0) {
    return (
      <div className="fade-in" style={{ paddingTop: 40, textAlign: "center" }}>
        <h1 style={{ marginBottom: 16 }}>Stats</h1>
        <div className="card" style={{ padding: 32 }}>
          <div style={{ fontSize: 40, marginBottom: 8, position: "relative" }}>{"\u{1F4CA}"}</div>
          <p style={{ color: "var(--ink2)", fontSize: 15, position: "relative" }}>Nothing to show yet. Add and practice some words!</p>
        </div>
      </div>
    );
  }

  return (
    <div className="fade-in" style={{ paddingTop: 32 }}>
      <h1 style={{ marginBottom: 20 }}>Stats</h1>

      <div className="card" style={{ padding: 20, marginBottom: 16 }}>
        <h2 style={{ fontSize: 20, marginBottom: 14, position: "relative" }}>Translation Progress</h2>
        <div style={{ display: "flex", flexDirection: "column", gap: 10, position: "relative" }}>
          {LEVELS.map((lv, i) => (
            <div key={i}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 600, marginBottom: 4 }}>
                <span style={{ color: lv.color }}>{lv.label}</span>
                <span style={{ color: "var(--ink2)" }}>{counts[i]}</span>
              </div>
              <div style={{ background: "var(--warm)", borderRadius: 4, height: 8, overflow: "hidden" }}>
                <div
                  className="level-bar"
                  style={{ width: total ? `${(counts[i] / total) * 100}%` : "0%", background: lv.color }}
                />
              </div>
            </div>
          ))}
        </div>
      </div>

      {withArticle > 0 && (
        <div className="card" style={{ padding: 20, marginBottom: 16 }}>
          <h2 style={{ fontSize: 20, marginBottom: 14, position: "relative" }}>Gender Progress</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, position: "relative" }}>
            {LEVELS.map((lv, i) => (
              <div key={i}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 600, marginBottom: 4 }}>
                  <span style={{ color: lv.color }}>{lv.label}</span>
                  <span style={{ color: "var(--ink2)" }}>{genderCounts[i]}</span>
                </div>
                <div style={{ background: "var(--warm)", borderRadius: 4, height: 8, overflow: "hidden" }}>
                  <div
                    className="level-bar"
                    style={{ width: withArticle ? `${(genderCounts[i] / withArticle) * 100}%` : "0%", background: lv.color }}
                  />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="card" style={{ padding: 20, marginBottom: 16 }}>
        <h2 style={{ fontSize: 20, marginBottom: 14, position: "relative" }}>Word Details</h2>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 300, overflowY: "auto", position: "relative" }}>
          {words.map((w, i) => {
            const lv = getLevel(w);
            return (
              <div key={i} className="word-row" style={{ fontSize: 13 }}>
                <div style={{ flex: 1 }}>
                  <span style={{ fontWeight: 600 }}>
                    {w.article && <span style={{ color: "var(--accent2)" }}>{w.article} </span>}
                    {w.de}
                  </span>
                  <span style={{ color: "var(--ink2)", margin: "0 4px" }}>{"\u2192"}</span>
                  <span>{w.fr}</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  {catNames[w.category] && (
                    <span style={{ fontSize: 10, color: "var(--ink2)", background: "var(--warm)", padding: "1px 6px", borderRadius: 4 }}>
                      {catNames[w.category]}
                    </span>
                  )}
                  <span
                    style={{
                      fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 6,
                      background: LEVELS[lv].bg, color: LEVELS[lv].color,
                    }}
                  >
                    {LEVELS[lv].label}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <button className="btn btn-outline" style={{ color: "var(--red)", borderColor: "#fdecea" }} onClick={() => setConfirm(true)}>
        Reset all progress
      </button>

      {confirm && (
        <div className="confirm-modal" onClick={() => setConfirm(false)}>
          <div className="confirm-box" onClick={(e) => e.stopPropagation()}>
            <h2 style={{ marginBottom: 8 }}>Reset progress?</h2>
            <p style={{ fontSize: 14, color: "var(--ink2)", marginBottom: 20 }}>
              This resets all stats for every word. Your word list stays intact.
            </p>
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn btn-secondary" onClick={() => setConfirm(false)}>Cancel</button>
              <button className="btn btn-red" onClick={resetAll}>Reset</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── render ───────────────────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<VocabTrainer />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>
</body>
